apiVersion: apps/v1
kind: Deployment

metadata:
  name: transaction-api
  namespace: prod

spec:
  replicas: 1

  selector:
    matchLabels:
      app: transaction-api

  template:
    metadata:
      labels:
        app: transaction-api

    spec:
      containers:
      - name: transaction-api

        image: IMAGE_PLACEHOLDER

        imagePullPolicy: Always

        ports:
        - containerPort: 8080

        env:
        - name: ENVIRONMENT
          value: PROD

        resources:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"

        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
